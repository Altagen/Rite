name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+*'

permissions:
  contents: write

jobs:
  # Create draft release with changelog
  create-release:
    name: 📋 Create Release
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create_release.outputs.id }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: changelog.md

      - name: Create draft release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: RITE ${{ steps.version.outputs.version }}
          body_path: changelog.md
          draft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Build for all platforms
  build-tauri:
    name: 🔨 Build (${{ matrix.platform.name }})
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: Linux x86_64
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            arch: x86_64

          - name: Linux ARM64
            os: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            arch: aarch64

          - name: macOS x86_64
            os: macos-latest
            target: x86_64-apple-darwin
            arch: x86_64

          - name: macOS ARM64
            os: macos-latest
            target: aarch64-apple-darwin
            arch: aarch64

    runs-on: ${{ matrix.platform.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri
          key: ${{ matrix.platform.target }}

      - name: Install system dependencies (Linux)
        if: startsWith(matrix.platform.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install pnpm dependencies
        run: pnpm install

      - name: Build Tauri app
        run: cd apps/desktop && pnpm tauri build --target ${{ matrix.platform.target }}

      - name: Prepare and rename artifacts
        shell: bash
        run: |
          VERSION="${{ needs.create-release.outputs.version }}"
          mkdir -p dist

          if [[ "${{ matrix.platform.os }}" == ubuntu* ]]; then
            PLATFORM="linux"
            ARCH="${{ matrix.platform.arch }}"
            BUNDLE_PATH="${{ github.workspace }}/target/${{ matrix.platform.target }}/release/bundle"

            find "$BUNDLE_PATH/deb" -name "*.deb" -type f -exec cp {} "dist/rite-${VERSION}-${PLATFORM}-${ARCH}.deb" \; 2>/dev/null || true
            find "$BUNDLE_PATH/rpm" -name "*.rpm" -type f -exec cp {} "dist/rite-${VERSION}-${PLATFORM}-${ARCH}.rpm" \; 2>/dev/null || true
            find "$BUNDLE_PATH/appimage" -name "*.AppImage" -type f -exec cp {} "dist/rite-${VERSION}-${PLATFORM}-${ARCH}.AppImage" \; 2>/dev/null || true

            BINARY="${{ github.workspace }}/target/${{ matrix.platform.target }}/release/rite"
            if [ -f "$BINARY" ]; then
              tar -czf "dist/rite-${VERSION}-${PLATFORM}-${ARCH}.tar.gz" -C "$(dirname $BINARY)" rite
            fi
          fi

          if [ "${{ matrix.platform.os }}" = "macos-latest" ]; then
            PLATFORM="macos"
            ARCH="${{ matrix.platform.arch }}"
            BUNDLE_PATH="${{ github.workspace }}/target/${{ matrix.platform.target }}/release/bundle"

            find "$BUNDLE_PATH/dmg" -name "*.dmg" -type f -exec cp {} "dist/rite-${VERSION}-${PLATFORM}-${ARCH}.dmg" \; 2>/dev/null || true

            BINARY="${{ github.workspace }}/target/${{ matrix.platform.target }}/release/rite"
            if [ -f "$BINARY" ]; then
              tar -czf "dist/rite-${VERSION}-${PLATFORM}-${ARCH}.tar.gz" -C "$(dirname $BINARY)" rite
            fi
          fi

          echo "Artifacts:"
          ls -lh dist/

      - name: Generate checksums
        shell: bash
        run: |
          cd dist
          for file in *; do
            if [ -f "$file" ] && [[ "$file" != *.sha256 ]]; then
              sha256sum "$file" > "$file.sha256"
            fi
          done

      - name: Upload artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Generate SBOM and consolidated checksums
  finalize:
    name: 📦 Finalize Release
    needs: [create-release, build-tauri]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx

      - name: Generate SBOM
        working-directory: apps/desktop/src-tauri
        run: cargo cyclonedx --format json

      - name: Rename SBOM
        run: |
          VERSION="${{ needs.create-release.outputs.version }}"
          mv apps/desktop/src-tauri/rite.cdx.json sbom-${VERSION}.json

      - name: Download release assets
        uses: robinraju/release-downloader@v1
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          fileName: "*.sha256"
          out-file-path: "checksums"
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create consolidated checksums file
        run: |
          VERSION="${{ needs.create-release.outputs.version }}"
          cd checksums
          cat *.sha256 > "../rite-${VERSION}-checksums.txt"
          echo "Consolidated checksums:"
          cat "../rite-${VERSION}-checksums.txt"

      - name: Upload SBOM and checksums
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            sbom-${{ needs.create-release.outputs.version }}.json
            rite-${{ needs.create-release.outputs.version }}-checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Publish release (remove draft status)
  publish:
    name: 🚀 Publish Release
    needs: [create-release, finalize]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish release
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
              draft: false
            });
